<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh mục sản phẩm - E-Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header id="header"></header>
  <main class="container my-4">
    <div class="row">
      <aside class="col-md-3">
        <div class="card p-3 mb-3">
          <h6>Danh mục</h6>
          <ul id="category-list" class="list-unstyled"></ul>
        </div>
        <div class="card p-3">
          <h6>Lọc theo giá</h6>
          <input id="price-min" class="form-control form-control-sm mb-2" placeholder="Giá từ (₫)">
          <input id="price-max" class="form-control form-control-sm" placeholder="Giá đến (₫)">
          <button id="apply-filter" class="btn btn-sm btn-primary mt-2">Áp dụng</button>
        </div>
      </aside>
      <section class="col-md-9">
        <div id="catalog-controls" class="d-flex justify-content-between align-items-center mb-3">
          <h4>Danh sách sản phẩm</h4>
          <div>
            <select id="sort-select" class="form-select form-select-sm" style="width:auto;display:inline-block;">
              <option value="featured">Nổi bật</option>
              <option value="price-asc">Giá: thấp → cao</option>
              <option value="price-desc">Giá: cao → thấp</option>
            </select>
          </div>
        </div>
        <div id="product-list" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"></div>
        <nav class="mt-3"><ul id="pager" class="pagination"></ul></nav>
      </section>
    </div>
  </main>
  <footer id="footer" class="site-footer"></footer>
  <script type="module" src="js/pages/categoryPage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
