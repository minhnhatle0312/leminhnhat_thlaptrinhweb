<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liên hệ - E-Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header id="header"></header>
  <main class="container my-5">
    <div class="card p-4 shadow-sm">
      <h1>Liên hệ</h1>
      <p>Vui lòng gửi thông tin và chúng tôi sẽ liên hệ trong vòng 24 giờ.</p>
      <form id="contact-form">
        <div class="mb-3"><label class="form-label">Tên</label><input class="form-control" id="name" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" id="email" type="email" required></div>
        <div class="mb-3"><label class="form-label">Nội dung</label><textarea class="form-control" id="message" rows="5" required></textarea></div>
        <button class="btn btn-primary" type="submit">Gửi</button>
      </form>
    </div>
  </main>
  <footer id="footer" class="site-footer"></footer>
  <script type="module" src="js/pages/contactPage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
