<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanh toán - E-Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header id="header"></header>
  <main class="container my-5">
    <div class="row">
      <div class="col-md-8">
        <div class="card p-3 shadow-sm">
          <h3>Thông tin giao hàng</h3>
          <form id="checkout-form">
            <div class="mb-3">
              <label class="form-label">Họ tên</label>
              <input class="form-control" id="name" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Địa chỉ</label>
              <input class="form-control" id="address" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Số điện thoại</label>
              <input class="form-control" id="phone" required />
            </div>
            <button class="btn btn-primary" type="submit">Thanh toán</button>
          </form>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 shadow-sm" id="checkout-summary">
          <h5>Đơn hàng</h5>
          <div id="order-items"></div>
          <div class="fw-bold mt-3">Tổng: <span id="order-total">0₫</span></div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer" class="site-footer"></footer>
  <script type="module" src="js/pages/checkoutPage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
